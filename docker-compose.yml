services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    container_name: vve-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend

  backend:
    build:
      context: ./apps/backend
    container_name: vve-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      APP_NAME: ${APP_NAME:-Virtus et Veritas Engine}
      APP_ENV: ${APP_ENV:-development}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://vve_user:change_me_secure_password@postgres:5432/vve_engine}
      JWT_SECRET: ${JWT_SECRET:-change_me_super_secret_key}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-1440}
      API_ENCRYPTION_KEY: ${API_ENCRYPTION_KEY}
      SEED_ORGANIZATION_NAME: ${SEED_ORGANIZATION_NAME:-Virtus et Veritas Academy}
      SEED_ORGANIZATION_SLUG: ${SEED_ORGANIZATION_SLUG:-virtus-et-veritas-academy}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Leonardo Elias}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-change_me_admin_password}
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_PROVIDER_NAME: ${OPENAI_PROVIDER_NAME:-OpenAI}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-gpt-5-mini}
      GEMINI_PROVIDER_NAME: ${GEMINI_PROVIDER_NAME:-Gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_DEFAULT_MODEL: ${GEMINI_DEFAULT_MODEL:-gemini-2.5-flash}
      GEMINI_MAX_OUTPUT_TOKENS: ${GEMINI_MAX_OUTPUT_TOKENS:-8192}
      GEMINI_TIMEOUT_SECONDS: ${GEMINI_TIMEOUT_SECONDS:-180}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
      ELEVENLABS_TTS_MODEL: ${ELEVENLABS_TTS_MODEL:-eleven_multilingual_v2}
      ELEVENLABS_OUTPUT_FORMAT: ${ELEVENLABS_OUTPUT_FORMAT:-mp3_44100_128}
      VIDEO_PROVIDER: ${VIDEO_PROVIDER:-mock}
      HEYGEN_API_KEY: ${HEYGEN_API_KEY}
      HEYGEN_API_BASE_URL: ${HEYGEN_API_BASE_URL:-https://api.heygen.com}
      HEYGEN_DEFAULT_AVATAR_ID: ${HEYGEN_DEFAULT_AVATAR_ID}
      HEYGEN_WEBHOOK_SECRET: ${HEYGEN_WEBHOOK_SECRET}
      HEYGEN_POLL_INTERVAL_SECONDS: ${HEYGEN_POLL_INTERVAL_SECONDS:-15}
      DID_API_KEY: ${DID_API_KEY}
      DID_API_BASE_URL: ${DID_API_BASE_URL:-https://api.d-id.com}
      DID_DEFAULT_SOURCE_IMAGE_URL: ${DID_DEFAULT_SOURCE_IMAGE_URL}
      SYNC_API_KEY: ${SYNC_API_KEY}
      SYNC_API_BASE_URL: ${SYNC_API_BASE_URL:-https://api.sync.so/v2}
      SYNC_DEFAULT_SOURCE_VIDEO_URL: ${SYNC_DEFAULT_SOURCE_VIDEO_URL}
      SYNC_DEFAULT_SOURCE_IMAGE_URL: ${SYNC_DEFAULT_SOURCE_IMAGE_URL}
      SYNC_DEFAULT_MODEL: ${SYNC_DEFAULT_MODEL:-lipsync-2}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_PATH: ${STORAGE_PATH:-/app/storage}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: vve-postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vve_engine}
      POSTGRES_USER: ${POSTGRES_USER:-vve_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
